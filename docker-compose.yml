version: '3.8'

services:
  # MySQL
  database:
    image: mysql:8.0
    container_name: monorepo-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  #Laravel
  laravel-app:
    build:
      context: ./api-backend
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./api-backend:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=database
      - DB_PORT=3306
      - DB_DATABASE=laravel_db
      - DB_USERNAME=laravel_user
      - DB_PASSWORD=laravel_password
    depends_on:
      - database
    networks:
      - app-network

  # React
  react-app:
    build:
      context: ./web-frontend
      dockerfile: Dockerfile
    container_name: react-app
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./web-frontend:/app
      - /app/node_modules
    networks:
      - app-network
    depends_on:
      - laravel-app

  # AI Engine (Python)
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: ai-engine
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./ai-engine:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - database
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
